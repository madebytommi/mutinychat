# Every exception is transitive, has no compatible upstream fix, and expires so
# the dependency must be reassessed. Do not add an exception for a fixable
# advisory merely to make CI pass.

# Tauri 2 currently depends on the GTK3 Rust bindings on Linux. These RustSec
# advisories report that the crates are unmaintained and provide no fixed
# version. MutinyChat does not depend on their APIs directly.
[[IgnoredVulns]]
id = "RUSTSEC-2024-0413"
ignoreUntil = 2026-10-20
reason = "Linux-only transitive GTK3 crate required by Tauri 2; unmaintained advisory has no fixed version"

