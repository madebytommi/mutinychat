name: CI

on:
  push:
    branches:
      - main
      - "chatgpt/**"
  pull_request:

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r backend/requirements.txt
      - run: python -m compileall -q backend/main.py backend/test_main.py
      - name: Run backend unit tests
        shell: bash
        run: |
          set +e
          python -m unittest discover -s backend -p 'test_*.py' -v > backend-tests.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 100 backend-tests.log
            exit "$status"
          fi
          cat backend-tests.log

  rust:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
      - name: Run Clippy
        shell: bash
        run: |
          set -o pipefail
          cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings 2>&1 | tail -n 160
      - run: cargo test --manifest-path src-tauri/Cargo.toml --all-features
