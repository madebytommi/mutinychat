name: CI

on:
  push:
    branches:
      - main
      - "chatgpt/**"
  pull_request:

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20.19.5
          cache: npm
      - run: npm ci
      - run: npm run check:release-policy
      - run: npm run check:supply-chain
      - run: npm run check
      - run: npm run test:frontend
      - run: npm run build
      - name: Reject external frontend runtime resources
        run: npm run check:frontend-network
      - name: Validate Tauri content security policy
        run: npm run check:tauri-csp
      - name: Upload frontend privacy findings
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: frontend-network-findings-${{ github.run_id }}-${{ runner.os }}
          path: artifacts/frontend-network-report.txt
          if-no-files-found: ignore

  backend:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: python -m pip install --disable-pip-version-check --require-hashes -r backend/requirements.txt
      - name: Compile backend source and tests
        run: python -m compileall -q backend
      - name: Run backend unit tests
        shell: bash
        run: |
          set +e
          python -m unittest discover -s backend -p 'test_*.py' -v > backend-tests.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 160 backend-tests.log
            exit "$status"
          fi
          cat backend-tests.log

  rust:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable action snapshot
        with:
          toolchain: 1.97.1
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: src-tauri
      - name: Create CI-only sidecar placeholders
        shell: bash
        run: |
          mkdir -p backend/dist
          touch backend/dist/mutinychat-backend-x86_64-unknown-linux-gnu
          touch backend/dist/tor-x86_64-unknown-linux-gnu
          chmod +x backend/dist/mutinychat-backend-x86_64-unknown-linux-gnu
          chmod +x backend/dist/tor-x86_64-unknown-linux-gnu
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
      - name: Run Clippy
        id: clippy
        shell: bash
        run: |
          set +e
          cargo clippy --locked --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings > clippy.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 160 clippy.log
          exit 0
      - name: Upload Clippy diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: clippy-diagnostics
          path: clippy.log
      - name: Enforce Clippy result
        if: steps.clippy.outputs.status != '0'
        run: exit 1
      - run: cargo test --locked --manifest-path src-tauri/Cargo.toml --all-features
