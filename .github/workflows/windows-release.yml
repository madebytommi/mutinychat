name: Windows Build and Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing vX.Y.Z tag to build; leave empty for a non-release verification build"
        required: false
        type: string
      create_draft_release:
        description: "Create a draft GitHub release after the tagged build succeeds"
        required: false
        default: false
        type: boolean
  pull_request:
    paths:
      - ".github/workflows/windows-release.yml"
      - "backend/**"
      - "scripts/**"
      - "src/**"
      - "src-tauri/**"
      - "package.json"
      - "package-lock.json"
permissions:
  contents: read

concurrency:
  group: windows-${{ github.workflow }}-${{ inputs.release_tag || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20.19.5"
  PYTHON_VERSION: "3.12.13"
  RUST_VERSION: "1.97.1"
  GNUPG_VERSION: "2.5.20"
  GNUPG_PACKAGE_SHA256: 1D360942FFF13BC3B2C0446124ADEBAE40C6823A555ACAD23424878E6BC5B326
  RUST_TARGET: x86_64-pc-windows-msvc
  TOR_BROWSER_VERSION: "15.0.18"
  TOR_SIGNING_FINGERPRINT: EF6E286DDA85EA2A4BA7DE684E2C6E8793298290

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 0
          ref: ${{ inputs.release_tag || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate immutable build inputs
        run: npm run check:supply-chain

      - name: Validate release version and request
        shell: pwsh
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          CREATE_DRAFT_RELEASE: ${{ inputs.create_draft_release }}
        run: |
          npm run check:release-policy
          if ($env:RELEASE_TAG) {
            node scripts/check-release-version.mjs --tag $env:RELEASE_TAG
            $TagsAtHead = @(git tag --points-at HEAD)
            if ($TagsAtHead -notcontains $env:RELEASE_TAG) {
              throw "Checked-out commit is not the requested tag $env:RELEASE_TAG"
            }
          }
          if ($env:CREATE_DRAFT_RELEASE -eq "true" -and -not $env:RELEASE_TAG) {
            throw "Creating a draft release requires an existing release_tag"
          }

      - name: Check frontend
        run: npm run check

      - name: Test frontend security-state mapping
        run: npm run test:frontend

      - name: Build frontend
        run: npm run build

      - name: Reject external frontend runtime resources
        run: npm run check:frontend-network

      - name: Upload frontend privacy findings
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: frontend-network-findings-${{ github.run_id }}-${{ runner.os }}
          path: artifacts/frontend-network-report.txt
          if-no-files-found: ignore

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements-windows.lock

      - name: Compile and test backend source
        shell: pwsh
        run: |
          python -m pip install --disable-pip-version-check --require-hashes -r backend/requirements-windows.lock
          python -m compileall -q backend
          python -m unittest discover -s backend -p "test_*.py" -v

      - name: Build backend sidecar
        shell: pwsh
        run: ./scripts/build-backend-sidecar.ps1 -PythonExecutable python

      - name: Ensure GnuPG is available
        shell: pwsh
        run: |
          $PackageDirectory = Join-Path $env:RUNNER_TEMP "gnupg-package"
          $PackagePath = Join-Path $PackageDirectory "gnupg.$env:GNUPG_VERSION.nupkg"
          New-Item -ItemType Directory -Path $PackageDirectory -Force | Out-Null
          Invoke-WebRequest -Uri "https://community.chocolatey.org/api/v2/package/gnupg/$env:GNUPG_VERSION" -OutFile $PackagePath
          $PackageHash = (Get-FileHash -LiteralPath $PackagePath -Algorithm SHA256).Hash
          if ($PackageHash -ne $env:GNUPG_PACKAGE_SHA256) {
            throw "GnuPG Chocolatey package hash mismatch: $PackageHash"
          }
          choco install gnupg --version $env:GNUPG_VERSION --source $PackageDirectory --allow-downgrade -y --no-progress
          $ChocolateyBin = Join-Path $env:ChocolateyInstall "bin"
          $env:PATH = "$ChocolateyBin;$env:PATH"
          Add-Content -LiteralPath $env:GITHUB_PATH -Value $ChocolateyBin
          $GpgVersion = (gpg.exe --version | Select-Object -First 1)
          if ($GpgVersion -notmatch [regex]::Escape($env:GNUPG_VERSION)) {
            throw "Expected GnuPG $env:GNUPG_VERSION but received: $GpgVersion"
          }
          Write-Host $GpgVersion

      - name: Download and verify official Tor Expert Bundle
        shell: pwsh
        run: >-
          ./scripts/prepare-tor-windows.ps1
          -TorBrowserVersion "${{ env.TOR_BROWSER_VERSION }}"
          -TorSigningFingerprint "${{ env.TOR_SIGNING_FINGERPRINT }}"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable action snapshot
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ env.RUST_TARGET }}
          components: rustfmt, clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: src-tauri

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: Run Rust clippy
        run: cargo clippy --locked --manifest-path src-tauri/Cargo.toml --target ${{ env.RUST_TARGET }} --all-targets --all-features -- -D warnings

      - name: Run Rust tests
        run: cargo test --locked --manifest-path src-tauri/Cargo.toml --target ${{ env.RUST_TARGET }} --all-features

      - name: Build Windows installers
        run: npx --no-install tauri build --target ${{ env.RUST_TARGET }} --bundles nsis,msi

      - name: Verify packaged runtime and create portable ZIP
        shell: pwsh
        run: >-
          ./scripts/verify-windows-package.ps1
          -TargetDirectory "src-tauri\target\${{ env.RUST_TARGET }}\release"

      - name: Briefly launch packaged application
        shell: pwsh
        run: |
          $App = Resolve-Path "src-tauri/target/${{ env.RUST_TARGET }}/release/mutinychat.exe"
          $Process = Start-Process -FilePath $App -PassThru
          Start-Sleep -Seconds 8
          if ($Process.HasExited) {
            throw "Packaged application exited immediately with code $($Process.ExitCode)"
          }
          Stop-Process -Id $Process.Id -Force
          Get-Process mutinychat-backend, tor -ErrorAction SilentlyContinue | Stop-Process -Force

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mutinychat-windows-${{ inputs.release_tag || github.sha }}
          path: artifacts/windows/*
          if-no-files-found: error
          retention-days: 14

  attest-release:
    if: github.event_name == 'workflow_dispatch' && inputs.release_tag != ''
    needs: build-windows
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Download verified Windows artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: mutinychat-windows-${{ inputs.release_tag }}
          path: artifacts/windows

      - name: Verify artifact checksums before attestation
        working-directory: artifacts/windows
        run: sha256sum --check SHA256SUMS.txt

      - name: Attest tagged release artifacts
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: artifacts/windows/*

  create-draft-release:
    if: github.event_name == 'workflow_dispatch' && inputs.create_draft_release && inputs.release_tag != ''
    needs:
      - build-windows
      - attest-release
    runs-on: ubuntu-22.04
    environment: release
    permissions:
      contents: write
    steps:
      - name: Check out tagged source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 0
          ref: ${{ inputs.release_tag }}

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download verified Windows artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: mutinychat-windows-${{ inputs.release_tag }}
          path: artifacts/windows

      - name: Verify release tag and checksums
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          node scripts/check-release-version.mjs --tag "$RELEASE_TAG"
          cd artifacts/windows
          sha256sum --check SHA256SUMS.txt

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: >-
          gh release create "${RELEASE_TAG}"
          artifacts/windows/*
          --repo "${GITHUB_REPOSITORY}"
          --title "MutinyChat ${RELEASE_TAG}"
          --verify-tag
          --draft
          --generate-notes
