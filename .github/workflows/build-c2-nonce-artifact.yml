name: Build C2 nonce binding patch

on:
  push:
    branches:
      - chatgpt/authenticate-participants

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: chatgpt/authenticate-participants
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply fresh nonce binding
        run: python scripts/apply-c2-nonce-binding.py
      - name: Compile generated backend files
        run: python -m compileall -q backend
      - name: Commit generated files to repair branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/main.py backend/test_main.py backend/test_participant_handshake.py
          git commit -m "Bind participant verification to fresh handshake nonces"
          git push origin HEAD:chatgpt/authenticate-participants
