name: Build C2 participant authentication patch

on:
  push:
    branches:
      - chatgpt/authenticate-participants

permissions:
  contents: write

jobs:
  build-patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: chatgpt/authenticate-participants
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Repair and apply patch
        run: |
          python scripts/fix-c2-patch-script.py
          python scripts/apply-c2-participant-auth.py
          python scripts/postprocess-c2-generated.py
      - name: Compile patched Python files
        run: python -m compileall -q backend/main.py backend/sidecar.py backend/participant_auth.py backend/test_main.py backend/test_sidecar.py backend/test_participant_auth.py
      - name: Commit generated files to repair branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/main.py backend/sidecar.py backend/test_main.py backend/test_sidecar.py src/App.svelte README.md
          git commit -m "Authenticate participants before messaging"
          git push origin HEAD:chatgpt/authenticate-participants
