name: Build C2 participant authentication patch

on:
  push:
    branches:
      - chatgpt/authenticate-participants
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply patch in temporary workspace
        id: patch
        shell: bash
        run: |
          set +e
          python scripts/apply-c2-participant-auth.py > c2-patch.log 2>&1
          status=$?
          cat c2-patch.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: c2-patch-diagnostics-${{ github.sha }}
          path: c2-patch.log
          if-no-files-found: error
          retention-days: 2
      - name: Enforce patch result
        if: steps.patch.outputs.status != '0'
        run: exit 1
      - name: Compile patched Python files
        run: python -m compileall -q backend/main.py backend/sidecar.py backend/participant_auth.py backend/test_main.py backend/test_sidecar.py backend/test_participant_auth.py
      - name: Upload patched source files
        uses: actions/upload-artifact@v4
        with:
          name: c2-participant-auth-patched-files-${{ github.sha }}
          path: |
            backend/main.py
            backend/sidecar.py
            backend/test_main.py
            backend/test_sidecar.py
            src/App.svelte
            README.md
          if-no-files-found: error
          retention-days: 2
